name: SKAI Visual Beta Test

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: "URL da testare. Lascia vuoto per avviare l'app dal repo in locale."
        required: false
        default: ""
      fail_on_visual_issues:
        description: "Blocca il workflow se trova problemi grafici critici"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read

jobs:
  visual-beta-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install QA dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            python -m pip install -r requirements.txt
          fi
          python -m pip install playwright==1.49.1 Pillow==11.1.0 numpy==2.2.1
          python -m playwright install chromium

      - name: Create visual beta test script
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p qa/reports qa/screenshots
          cat > qa/visual_beta_test.py <<'PY'
          from __future__ import annotations

          import argparse
          import json
          import math
          import re
          import statistics
          import subprocess
          import time
          from dataclasses import dataclass
          from datetime import datetime, UTC
          from pathlib import Path
          from typing import Any
          from urllib.parse import urlencode, urlparse, urlunparse, parse_qs

          import numpy as np
          from PIL import Image, ImageStat
          from playwright.sync_api import sync_playwright, TimeoutError as PlaywrightTimeoutError


          PAGES = [
              ("Home", "home", ["schiscetta", "SKiscettAI"]),
              ("Crea SKiscetta", "crea", ["Crea", "SKiscetta"]),
              ("SKAI Radar", "radar", ["Radar", "catene", "Volantini"]),
              ("Ricette", "ricette", ["Ricette"]),
              ("Lista spesa", "lista", ["Lista", "spesa"]),
              ("Meal plan", "meal", ["Piano", "pranzi"]),
              ("Preferiti", "preferiti", ["Preferiti"]),
          ]

          VIEWPORTS = [
              ("desktop", 1440, 1000),
              ("tablet", 900, 1100),
              ("mobile", 390, 900),
          ]

          ERROR_MARKERS = [
              "NameError",
              "Traceback",
              "ModuleNotFoundError",
              "AttributeError",
              "TypeError",
              "SyntaxError",
              "This app has encountered an error",
          ]

          RAW_HTML_MARKERS = [
              '<div class="skai-',
              "</div>",
              "<span>",
              "</span>",
              "<strong>",
              "</strong>",
          ]

          JARGON_MARKERS = [
              "App Store grade",
              "pantry intelligence",
              "weekly autopilot",
              "trust filter",
              "mission-first",
              "map-first",
              "verified offers",
              "no fake prices",
          ]

          REQUIRED_ABOVE_FOLD = {
              "home": ["schiscetta", "Copilot"],
              "radar": ["Radar", "catene"],
              "lista": ["Lista"],
              "ricette": ["Ricette"],
              "meal": ["Piano"],
              "preferiti": ["Preferiti"],
              "crea": ["SKiscetta"],
          }


          def page_url(base_url: str, slug: str, qa_fast: bool = True, extra: dict[str, str] | None = None) -> str:
              parsed = urlparse(base_url)
              query = parse_qs(parsed.query)
              query["qa_page"] = [slug]
              if qa_fast:
                  query["qa_fast"] = ["1"]
              if extra:
                  for key, value in extra.items():
                      query[key] = [str(value)]
              return urlunparse(parsed._replace(query=urlencode(query, doseq=True)))


          def luminance(rgb: tuple[int, int, int]) -> float:
              r, g, b = [v / 255 for v in rgb]

              def channel(c: float) -> float:
                  return c / 12.92 if c <= 0.03928 else ((c + 0.055) / 1.055) ** 2.4

              return 0.2126 * channel(r) + 0.7152 * channel(g) + 0.0722 * channel(b)


          def contrast_ratio(rgb1: tuple[int, int, int], rgb2: tuple[int, int, int]) -> float:
              l1 = luminance(rgb1)
              l2 = luminance(rgb2)
              lighter = max(l1, l2)
              darker = min(l1, l2)
              return (lighter + 0.05) / (darker + 0.05)


          def image_metrics(path: Path) -> dict[str, Any]:
              image = Image.open(path).convert("RGB")
              width, height = image.size

              # Whole page.
              whole = image.copy()
              whole.thumbnail((480, 480))
              whole_pixels = np.array(whole)
              whole_brightness = float(np.mean(
                  0.2126 * whole_pixels[:, :, 0] +
                  0.7152 * whole_pixels[:, :, 1] +
                  0.0722 * whole_pixels[:, :, 2]
              ))

              # Main content area: crop out left sidebar on desktop/tablet.
              left = int(width * 0.18) if width >= 800 else 0
              main = image.crop((left, 0, width, min(height, 1200)))
              main.thumbnail((480, 480))
              main_pixels = np.array(main)
              main_luma = (
                  0.2126 * main_pixels[:, :, 0] +
                  0.7152 * main_pixels[:, :, 1] +
                  0.0722 * main_pixels[:, :, 2]
              )
              main_brightness = float(np.mean(main_luma))
              dark_ratio = float(np.mean(main_luma < 55))
              very_dark_ratio = float(np.mean(main_luma < 30))
              very_light_ratio = float(np.mean(main_luma > 235))

              # Colorfulness/modernity proxy.
              rg = np.abs(main_pixels[:, :, 0].astype(float) - main_pixels[:, :, 1].astype(float))
              yb = np.abs(0.5 * (main_pixels[:, :, 0].astype(float) + main_pixels[:, :, 1].astype(float)) - main_pixels[:, :, 2].astype(float))
              colorfulness = float(np.sqrt(np.std(rg) ** 2 + np.std(yb) ** 2) + 0.3 * np.sqrt(np.mean(rg) ** 2 + np.mean(yb) ** 2))

              # Edge density proxy for clutter.
              gray = main_luma.astype(np.float32)
              gx = np.abs(np.diff(gray, axis=1))
              gy = np.abs(np.diff(gray, axis=0))
              edge_density = float((np.mean(gx > 28) + np.mean(gy > 28)) / 2)

              # Representative palette.
              small = main.resize((80, max(1, int(80 * main.size[1] / max(main.size[0], 1)))))
              pixels = np.array(small).reshape(-1, 3)
              # Quantize coarsely.
              quant = (pixels // 32) * 32
              unique, counts = np.unique(quant, axis=0, return_counts=True)
              order = np.argsort(counts)[::-1][:8]
              palette = [
                  {
                      "rgb": [int(v) for v in unique[i]],
                      "hex": "#{:02X}{:02X}{:02X}".format(*[int(v) for v in unique[i]]),
                      "share": round(float(counts[i] / counts.sum()), 4),
                  }
                  for i in order
              ]

              return {
                  "width": width,
                  "height": height,
                  "whole_brightness": round(whole_brightness, 2),
                  "main_brightness": round(main_brightness, 2),
                  "dark_ratio": round(dark_ratio, 4),
                  "very_dark_ratio": round(very_dark_ratio, 4),
                  "very_light_ratio": round(very_light_ratio, 4),
                  "colorfulness": round(colorfulness, 2),
                  "edge_density": round(edge_density, 4),
                  "palette": palette,
              }


          def dom_metrics(page) -> dict[str, Any]:
              return page.evaluate(
                  """
                  () => {
                    const all = Array.from(document.querySelectorAll('body *'));
                    const visible = all.filter(el => {
                      const r = el.getBoundingClientRect();
                      const s = window.getComputedStyle(el);
                      return r.width > 2 && r.height > 2 && s.visibility !== 'hidden' && s.display !== 'none';
                    });

                    const buttons = visible.filter(el => el.tagName === 'BUTTON');
                    const inputs = visible.filter(el => ['INPUT','TEXTAREA','SELECT'].includes(el.tagName) || el.getAttribute('role') === 'combobox');
                    const cards = visible.filter(el => {
                      const s = window.getComputedStyle(el);
                      const br = parseFloat(s.borderRadius || '0');
                      const bg = s.backgroundColor || '';
                      const shadow = s.boxShadow || '';
                      return br >= 12 && (bg.includes('rgb') || shadow !== 'none');
                    });

                    const texts = visible
                      .map(el => (el.innerText || '').trim())
                      .filter(t => t.length > 0 && t.length < 500);

                    const fold = visible.filter(el => {
                      const r = el.getBoundingClientRect();
                      return r.top >= 0 && r.top < window.innerHeight && r.height > 5;
                    });

                    const smallLowContrast = [];
                    for (const el of visible) {
                      const text = (el.innerText || '').trim();
                      if (!text || text.length > 160) continue;
                      const s = window.getComputedStyle(el);
                      const color = s.color;
                      const bg = s.backgroundColor;
                      const size = parseFloat(s.fontSize || '16');
                      const weight = parseInt(s.fontWeight || '400', 10);
                      const r = el.getBoundingClientRect();
                      if (r.width < 5 || r.height < 5) continue;
                      smallLowContrast.push({
                        text: text.slice(0, 90),
                        color,
                        backgroundColor: bg,
                        fontSize: size,
                        fontWeight: weight,
                        x: Math.round(r.x),
                        y: Math.round(r.y),
                      });
                      if (smallLowContrast.length >= 80) break;
                    }

                    return {
                      visibleElements: visible.length,
                      buttons: buttons.length,
                      inputs: inputs.length,
                      cards: cards.length,
                      aboveFoldElements: fold.length,
                      textSamples: texts.slice(0, 80),
                      lowContrastCandidates: smallLowContrast,
                      bodyTextLength: document.body.innerText.length,
                      viewport: { width: window.innerWidth, height: window.innerHeight },
                    };
                  }
                  """
              )


          def rgb_from_css(value: str) -> tuple[int, int, int] | None:
              if not value:
                  return None
              match = re.search(r"rgba?\((\d+),\s*(\d+),\s*(\d+)", value)
              if not match:
                  return None
              return tuple(int(match.group(i)) for i in range(1, 4))


          def analyze_contrast(candidates: list[dict[str, Any]]) -> list[dict[str, Any]]:
              issues = []
              for item in candidates:
                  fg = rgb_from_css(item.get("color", ""))
                  bg = rgb_from_css(item.get("backgroundColor", ""))
                  # Transparent backgrounds are common; skip rather than producing noisy false positives.
                  if not fg or not bg or "rgba(0, 0, 0, 0)" in item.get("backgroundColor", ""):
                      continue
                  ratio = contrast_ratio(fg, bg)
                  min_ratio = 3.0 if item.get("fontSize", 16) >= 18 or item.get("fontWeight", 400) >= 700 else 4.5
                  if ratio < min_ratio:
                      issue = dict(item)
                      issue["contrastRatio"] = round(ratio, 2)
                      issue["required"] = min_ratio
                      issues.append(issue)
              return issues[:30]


          def visible_buttons(page) -> list[dict[str, Any]]:
              return page.evaluate(
                  """
                  () => Array.from(document.querySelectorAll('button')).map((btn, index) => {
                    const r = btn.getBoundingClientRect();
                    const s = window.getComputedStyle(btn);
                    return {
                      index,
                      text: (btn.innerText || '').trim().slice(0, 120),
                      visible: r.width > 2 && r.height > 2 && s.display !== 'none' && s.visibility !== 'hidden',
                      enabled: !btn.disabled,
                      x: Math.round(r.x),
                      y: Math.round(r.y),
                      width: Math.round(r.width),
                      height: Math.round(r.height),
                      color: s.color,
                      backgroundColor: s.backgroundColor,
                    }
                  }).filter(x => x.visible);
                  """
              )


          def wait_app(page, markers: list[str] | None = None, loops: int = 40) -> str:
              page.wait_for_selector('[data-testid="stAppViewContainer"], .stApp', timeout=45000)
              markers = markers or []
              for _ in range(loops):
                  text = page.inner_text("body")
                  if not markers or any(m.lower() in text.lower() for m in markers):
                      return text
                  page.wait_for_timeout(1000)
              return page.inner_text("body")


          def page_issue_rules(slug: str, viewport: str, text: str, image: dict[str, Any], dom: dict[str, Any], contrast_issues: list[dict[str, Any]]) -> list[dict[str, Any]]:
              issues = []
              low_text = text.lower()

              if any(marker.lower() in low_text for marker in ERROR_MARKERS):
                  issues.append({"severity": "critical", "type": "runtime_error", "message": "Errore runtime visibile nella pagina."})

              if any(marker.lower() in low_text for marker in RAW_HTML_MARKERS):
                  issues.append({"severity": "high", "type": "raw_html", "message": "Tag HTML visibili all'utente."})

              jargon = [m for m in JARGON_MARKERS if m.lower() in low_text]
              if jargon:
                  issues.append({"severity": "medium", "type": "jargon", "message": "Testi troppo tecnici visibili.", "items": jargon})

              if image["main_brightness"] < 120:
                  issues.append({"severity": "high", "type": "too_dark", "message": "Pagina ancora troppo scura.", "value": image["main_brightness"]})

              if image["dark_ratio"] > 0.18:
                  issues.append({"severity": "medium", "type": "dark_areas", "message": "Troppe aree scure nel contenuto principale.", "value": image["dark_ratio"]})

              if image["very_light_ratio"] > 0.88:
                  issues.append({"severity": "medium", "type": "too_empty_or_white", "message": "Pagina forse troppo vuota/bianca, verificare gerarchia visiva.", "value": image["very_light_ratio"]})

              if image["edge_density"] > 0.18:
                  issues.append({"severity": "medium", "type": "visual_clutter", "message": "Possibile eccesso di dettagli/bordi/testi ravvicinati.", "value": image["edge_density"]})

              if dom["buttons"] == 0 and slug not in ["preferiti"]:
                  issues.append({"severity": "medium", "type": "missing_actions", "message": "Pochi o nessun pulsante visibile: la pagina potrebbe non guidare l'utente."})

              if len(contrast_issues) > 5:
                  issues.append({"severity": "high", "type": "low_contrast", "message": "Diversi testi potrebbero avere contrasto insufficiente.", "count": len(contrast_issues)})

              required = REQUIRED_ABOVE_FOLD.get(slug, [])
              if required:
                  first_screen = "\n".join(dom.get("textSamples", [])[:18]).lower()
                  missing = [m for m in required if m.lower() not in first_screen]
                  if missing and viewport in ["desktop", "mobile"]:
                      issues.append({"severity": "medium", "type": "above_fold", "message": "Informazioni chiave non abbastanza visibili nella prima schermata.", "missing": missing})

              if viewport == "mobile":
                  wide_buttons = [b for b in visible_buttons_cache if b.get("width", 0) > 380]
                  if wide_buttons:
                      issues.append({"severity": "medium", "type": "mobile_overflow", "message": "Possibili elementi troppo larghi su mobile.", "count": len(wide_buttons)})

              return issues


          def start_local_app_if_needed(target_url: str) -> tuple[str, subprocess.Popen | None]:
              if target_url:
                  return target_url, None

              log_path = Path("/tmp/skai_visual_streamlit.log")
              process = subprocess.Popen(
                  ["streamlit", "run", "app.py", "--server.headless", "true", "--server.port", "8501"],
                  stdout=log_path.open("w"),
                  stderr=subprocess.STDOUT,
              )

              import urllib.request
              for _ in range(90):
                  try:
                      urllib.request.urlopen("http://localhost:8501", timeout=2)
                      return "http://localhost:8501", process
                  except Exception:
                      time.sleep(2)

              raise RuntimeError("Streamlit locale non si è avviato entro il timeout.")


          def write_report(report: dict[str, Any], reports_dir: Path) -> None:
              reports_dir.mkdir(parents=True, exist_ok=True)
              (reports_dir / "skai_visual_beta_report.json").write_text(json.dumps(report, ensure_ascii=False, indent=2), encoding="utf-8")

              lines = [
                  "# SKAI Visual Beta Report",
                  "",
                  f"Generated: {report['generated_at']}",
                  f"Target: {report['target_url']}",
                  "",
                  "## Executive summary",
                  "",
              ]

              counts = report["summary"]
              lines.append(f"- Critical issues: {counts['critical']}")
              lines.append(f"- High issues: {counts['high']}")
              lines.append(f"- Medium issues: {counts['medium']}")
              lines.append(f"- Total screenshots: {counts['screenshots']}")
              lines.append("")

              lines.append("## Page results")
              lines.append("")
              for page in report["pages"]:
                  badge = "✅" if not page["issues"] else ("🚨" if any(i["severity"] == "critical" for i in page["issues"]) else "⚠️")
                  lines.append(f"### {badge} {page['page']} · {page['viewport']}")
                  lines.append("")
                  lines.append(f"- Screenshot: `{page['screenshot']}`")
                  lines.append(f"- Main brightness: `{page['image']['main_brightness']}`")
                  lines.append(f"- Dark ratio: `{page['image']['dark_ratio']}`")
                  lines.append(f"- Edge density: `{page['image']['edge_density']}`")
                  lines.append(f"- Buttons: `{page['dom']['buttons']}` · Inputs: `{page['dom']['inputs']}` · Cards: `{page['dom']['cards']}`")
                  if page["issues"]:
                      lines.append("- Issues:")
                      for issue in page["issues"]:
                          lines.append(f"  - **{issue['severity']}** · `{issue['type']}` · {issue['message']} {issue.get('value', '')}")
                  else:
                      lines.append("- Issues: none")
                  if page["contrast_issues"]:
                      lines.append("- Low contrast samples:")
                      for item in page["contrast_issues"][:5]:
                          lines.append(f"  - `{item['text']}` · contrast {item['contrastRatio']}")
                  lines.append("")

              lines.append("## What to inspect manually")
              lines.append("")
              lines.append("- Open the screenshots in `qa/screenshots/visual/`.")
              lines.append("- Check pages marked ⚠️ or 🚨 first.")
              lines.append("- Compare desktop/tablet/mobile for the same page.")
              lines.append("- If a page is technically bright but ugly, inspect palette and edge density.")
              lines.append("")

              (reports_dir / "skai_visual_beta_report.md").write_text("\n".join(lines), encoding="utf-8")


          def main():
              parser = argparse.ArgumentParser()
              parser.add_argument("--target-url", default="")
              parser.add_argument("--fail-on-visual-issues", default="false")
              args = parser.parse_args()

              root = Path.cwd()
              reports_dir = root / "qa" / "reports"
              screenshots_dir = root / "qa" / "screenshots" / "visual"
              screenshots_dir.mkdir(parents=True, exist_ok=True)

              target_url, process = start_local_app_if_needed(args.target_url.strip())

              report: dict[str, Any] = {
                  "generated_at": datetime.now(UTC).isoformat(),
                  "target_url": target_url,
                  "pages": [],
                  "summary": {"critical": 0, "high": 0, "medium": 0, "screenshots": 0},
              }

              try:
                  with sync_playwright() as p:
                      browser = p.chromium.launch(headless=True)

                      for viewport_name, width, height in VIEWPORTS:
                          context = browser.new_context(viewport={"width": width, "height": height}, device_scale_factor=1)
                          page = context.new_page()

                          for page_name, slug, markers in PAGES:
                              global visible_buttons_cache
                              visible_buttons_cache = []
                              url = page_url(target_url, slug, qa_fast=True, extra={"visualqa": viewport_name})
                              screenshot_path = screenshots_dir / f"{viewport_name}_{slug}.png"

                              try:
                                  page.goto(url, wait_until="domcontentloaded", timeout=60000)
                                  text = wait_app(page, markers, loops=35)
                                  page.wait_for_timeout(1200)
                                  page.screenshot(path=screenshot_path, full_page=True)
                                  visible_buttons_cache = visible_buttons(page)

                                  img = image_metrics(screenshot_path)
                                  dom = dom_metrics(page)
                                  contrast = analyze_contrast(dom.get("lowContrastCandidates", []))
                                  issues = page_issue_rules(slug, viewport_name, text, img, dom, contrast)

                                  entry = {
                                      "page": page_name,
                                      "slug": slug,
                                      "viewport": viewport_name,
                                      "url": url,
                                      "screenshot": str(screenshot_path.relative_to(root)),
                                      "image": img,
                                      "dom": {k: v for k, v in dom.items() if k != "lowContrastCandidates"},
                                      "contrast_issues": contrast,
                                      "buttons": visible_buttons_cache[:50],
                                      "issues": issues,
                                  }

                              except Exception as error:
                                  entry = {
                                      "page": page_name,
                                      "slug": slug,
                                      "viewport": viewport_name,
                                      "url": url,
                                      "screenshot": str(screenshot_path.relative_to(root)),
                                      "image": {},
                                      "dom": {},
                                      "contrast_issues": [],
                                      "buttons": [],
                                      "issues": [{"severity": "critical", "type": "qa_exception", "message": str(error)}],
                                  }

                              for issue in entry["issues"]:
                                  if issue["severity"] in report["summary"]:
                                      report["summary"][issue["severity"]] += 1
                              report["summary"]["screenshots"] += 1
                              report["pages"].append(entry)

                          context.close()

                      browser.close()
              finally:
                  if process:
                      process.terminate()

              write_report(report, reports_dir)

              should_fail = args.fail_on_visual_issues.lower() == "true"
              if should_fail and (report["summary"]["critical"] > 0 or report["summary"]["high"] > 0):
                  raise SystemExit(
                      f"Visual QA failed: critical={report['summary']['critical']} high={report['summary']['high']}"
                  )


          if __name__ == "__main__":
              visible_buttons_cache = []
              main()
          PY

      - name: Start app and run visual beta test
        shell: bash
        run: |
          set -euo pipefail
          TARGET_URL="${{ github.event.inputs.target_url }}"
          FAIL_ON_VISUAL="${{ github.event.inputs.fail_on_visual_issues }}"

          if [ -n "$TARGET_URL" ]; then
            python qa/visual_beta_test.py --target-url "$TARGET_URL" --fail-on-visual-issues "$FAIL_ON_VISUAL"
          else
            python qa/visual_beta_test.py --fail-on-visual-issues "$FAIL_ON_VISUAL"
          fi

      - name: Upload visual beta report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: skai-visual-beta-report
          path: |
            qa/reports/skai_visual_beta_report.md
            qa/reports/skai_visual_beta_report.json
            qa/screenshots/visual/
            /tmp/skai_visual_streamlit.log
