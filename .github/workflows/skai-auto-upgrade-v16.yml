      - name: Apply SKAI v19 files and cleanup
        shell: bash
        run: |
          set -euo pipefail

          cp -f /tmp/skai_v19_package/app.py app.py
          mkdir -p styles data docs qa .streamlit

          cp -f /tmp/skai_v19_package/styles/custom.css styles/custom.css
          cp -f /tmp/skai_v19_package/data/offer_sources.json data/offer_sources.json
          cp -f /tmp/skai_v19_package/README.md README.md
          cp -f /tmp/skai_v19_package/docs/roadmap.md docs/roadmap.md
          cp -f /tmp/skai_v19_package/.streamlit/config.toml .streamlit/config.toml

          if [ -f /tmp/skai_v19_package/qa/beta_test_skai.py ]; then
            cp -f /tmp/skai_v19_package/qa/beta_test_skai.py qa/beta_test_skai.py
          fi
          if [ -f /tmp/skai_v19_package/qa/requirements-qa.txt ]; then
            cp -f /tmp/skai_v19_package/qa/requirements-qa.txt qa/requirements-qa.txt
          fi

          rm -rf backup
          rm -rf qa/reports qa/screenshots

          find . -maxdepth 1 -type f \( \
            -name 'app_*.py' -o \
            -name '*_old.py' -o \
            -name '*_backup.py' -o \
            -name '*_test.py' -o \
            -name 'custom_*.css' -o \
            -name 'cleanup_*.md' -o \
            -name 'offers_*.csv' -o \
            -name 'offers_*.json' \
          \) -delete

          find data -maxdepth 1 -type f \( \
            -name 'offers*.json' -o \
            -name 'offers*.csv' -o \
            -name 'offer_sources_*v*.json' -o \
            -name 'offer_sources_web_preview_fix.json' -o \
            -name 'offer_sources_no_live_preview.json' \
          \) ! -name 'offer_sources.json' -delete || true

          find styles -maxdepth 1 -type f \( \
            -name 'custom_old.css' -o \
            -name 'custom_backup.css' -o \
            -name 'custom_*.css' \
          \) ! -name 'custom.css' -delete || true

          find . -type d -name '__pycache__' -prune -exec rm -rf {} +

          python -m py_compile app.py
          git status --short

      - name: Commit and push
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "SKAI Auto Upgrade"
          git config user.email "actions@github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Ship SKAI Kitchen OS v19"
          git push
