          b3VyY2VzLmpzb25QSwECFAMUAAAACAAAUMFckDMXkOAAAAA4AQAADwAAAAAAAAAAAAAApIFnygAA
          ZG9jcy9yb2FkbWFwLm1kUEsBAhQDFAAAAAgAAFDBXOWqFemKAAAAvAAAABYAAAAAAAAAAAAAAKSB
          dMsAAC5zdHJlYW1saXQvY29uZmlnLnRvbWxQSwECFAMUAAAACAAAUMFcejkaRO8PAAD5PgAAFAAA
          AAAAAAAAAAAApIEyzAAAcWEvYmV0YV90ZXN0X3NrYWkucHlQSwECFAMUAAAACAAAUMFc6eHSniIA
          AAAiAAAAFgAAAAAAAAAAAAAApIFT3AAAcWEvcmVxdWlyZW1lbnRzLXFhLnR4dFBLAQIUAxQAAAAI
          AABQwVwJovm4WgYAAO4QAAAWAAAAAAAAAAAAAACkgancAABxYS9saXZlX29mZmVyX2F1ZGl0LnB5
          UEsBAhQDFAAAAAgAAFDBXB2tcfVEDAAALicAABYAAAAAAAAAAAAAAKSBN+MAAHFhL2RlZXBfb2Zm
          ZXJfYXVkaXQucHlQSwUGAAAAABAAEAC5AwAAr+8AAAAA
          B64
          base64 -d /tmp/skai_v32_package.b64 > /tmp/skai_v32_package.zip
          mkdir -p /tmp/skai_v32_package
          unzip -o /tmp/skai_v32_package.zip -d /tmp/skai_v32_package

      - name: Apply SKAI v32 files and cleanup
        shell: bash
        run: |
          set -euo pipefail
          cp -f /tmp/skai_v32_package/app.py app.py
          mkdir -p styles data docs qa .streamlit
          cp -f /tmp/skai_v32_package/styles/custom.css styles/custom.css
          cp -f /tmp/skai_v32_package/data/offer_sources.json data/offer_sources.json
          cp -f /tmp/skai_v32_package/README.md README.md
          cp -f /tmp/skai_v32_package/docs/roadmap.md docs/roadmap.md
          cp -f /tmp/skai_v32_package/.streamlit/config.toml .streamlit/config.toml
          cp -f /tmp/skai_v32_package/qa/beta_test_skai.py qa/beta_test_skai.py
          cp -f /tmp/skai_v32_package/qa/requirements-qa.txt qa/requirements-qa.txt
          cp -f /tmp/skai_v32_package/qa/live_offer_audit.py qa/live_offer_audit.py
          cp -f /tmp/skai_v32_package/qa/deep_offer_audit.py qa/deep_offer_audit.py

          rm -rf backup
          rm -rf qa/reports qa/screenshots

          find . -maxdepth 1 -type f \( \
            -name 'app_*.py' -o \
            -name '*_old.py' -o \
            -name '*_backup.py' -o \
            -name '*_test.py' -o \
            -name 'custom_*.css' -o \
            -name 'cleanup_*.md' -o \
            -name 'offers_*.csv' -o \
            -name 'offers_*.json' \
          \) -delete

          find data -maxdepth 1 -type f \( \
            -name 'offers*.json' -o \
            -name 'offers*.csv' -o \
            -name 'offer_sources_*v*.json' -o \
            -name 'offer_sources_web_preview_fix.json' -o \
            -name 'offer_sources_no_live_preview.json' \
          \) ! -name 'offer_sources.json' -delete || true

          find styles -maxdepth 1 -type f \( \
            -name 'custom_old.css' -o \
            -name 'custom_backup.css' -o \
            -name 'custom_*.css' \
          \) ! -name 'custom.css' -delete || true

          find . -type d -name '__pycache__' -prune -exec rm -rf {} +

          python -m py_compile app.py
          python -m py_compile qa/beta_test_skai.py
          python -m py_compile qa/live_offer_audit.py
          python -m py_compile qa/deep_offer_audit.py
          grep -q "def parser_url_for_chain" app.py
          grep -q "skai_qa_boot" app.py
          grep -q "SKAI v31 Copy Helpers" app.py

      - name: Install app and QA dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -r qa/requirements-qa.txt
          python -m playwright install chromium

      - name: Run local Streamlit beta tests including copy QA
        shell: bash
        run: |
          set -euo pipefail
          streamlit run app.py --server.headless true --server.port 8501 > /tmp/skai_streamlit.log 2>&1 &
          echo $! > /tmp/skai_streamlit.pid
          for i in {1..90}; do
            if curl -fsS http://localhost:8501 >/dev/null 2>&1; then
              break
            fi
            sleep 2
          done
          python qa/beta_test_skai.py --url http://localhost:8501 --button-limit-per-page 24

      - name: Run non-blocking live offer audit
        if: always()
        continue-on-error: true
        shell: bash
        run: |
          python qa/live_offer_audit.py

      - name: Run non-blocking deep browser offer audit
        if: always()
        continue-on-error: true
        shell: bash
        run: |
          python qa/deep_offer_audit.py

      - name: Upload beta and offer audit reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: skai-v32-beta-report
          path: |
            qa/reports
            qa/screenshots
            /tmp/skai_streamlit.log

      - name: Commit and push if beta tests passed
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "SKAI Auto Upgrade"
          git config user.email "actions@github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Fix SKAI v31 QA and keep copy UX brightness"
          git push
